name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g., v0.1.0)'
        required: true
        type: string
  pull_request:

# Ensure only one release workflow runs at a time
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-bundle:
    name: Build and Bundle Platform
    runs-on: ubuntu-22.04
    outputs:
      bundle_filename: ${{ steps.bundle.outputs.bundle_filename }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.16.0
          use-cache: false

      - name: Clone Roc source
        run: |
          if [ ! -d "roc-src" ]; then
            echo "Building roc from pinned commit..."
            ROC_COMMIT=$(python3 ci/get_roc_commit.py)

            git init roc-src
            cd roc-src
            git remote add origin https://github.com/roc-lang/roc
            git fetch --depth 1 origin "$ROC_COMMIT"
            git checkout --detach "$ROC_COMMIT"
          fi

      - name: Build Roc
        uses: roc-lang/roc/.github/actions/flaky-retry@main
        with:
          command: cd roc-src && zig build roc
          error_string_contains: "build.zig.zon"

      - name: Add roc to PATH
        run: echo "$(pwd)/roc-src/zig-out/bin" >> "$GITHUB_PATH"

      - name: Build platform with ReleaseSafe
        run: zig build -Doptimize=ReleaseSafe

      - name: Bundle platform
        id: bundle
        run: |
          # Run bundle.sh and capture output
          BUNDLE_OUTPUT=$(./bundle.sh 2>&1)
          echo "$BUNDLE_OUTPUT"

          # Extract the tar.zst filename from "Created: /path/to/HASH.tar.zst" line
          BUNDLE_PATH=$(echo "$BUNDLE_OUTPUT" | grep "^Created:" | awk '{print $2}')
          BUNDLE_FILENAME=$(basename "$BUNDLE_PATH")

          if [ -z "$BUNDLE_FILENAME" ]; then
            echo "Error: Could not extract bundle filename from output"
            echo "Bundle output was:"
            echo "$BUNDLE_OUTPUT"
            exit 1
          fi

          echo "Bundle created: $BUNDLE_FILENAME"
          echo "bundle_filename=$BUNDLE_FILENAME" >> "$GITHUB_OUTPUT"

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: platform-bundle
          path: ${{ steps.bundle.outputs.bundle_filename }}
          retention-days: 30

  test-bundle:
    name: Test Bundle
    needs: build-and-bundle
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-15-intel
          - macos-15
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - windows-2022
          - windows-2025
          # TODO: re-enable windows-11-arm after https://codeberg.org/ziglang/zig/issues/31865 is fixed.
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.16.0
          use-cache: false

      - name: Clone Roc source
        run: |
          if [ ! -d "roc-src" ]; then
            echo "Building roc from pinned commit..."
            ROC_COMMIT=$(python3 ci/get_roc_commit.py)

            git init roc-src
            cd roc-src
            git remote add origin https://github.com/roc-lang/roc
            git fetch --depth 1 origin "$ROC_COMMIT"
            git checkout --detach "$ROC_COMMIT"
          fi

      - name: Build Roc
        uses: roc-lang/roc/.github/actions/flaky-retry@3d0fdde9ae6ffb5ef411f8c8c2fc2cdce22a74fe
        with:
          command: cd roc-src && zig build roc
          error_string_contains: "build.zig.zon"

      - name: Add roc to PATH
        run: echo "$(pwd)/roc-src/zig-out/bin" >> "$GITHUB_PATH"

      - name: Download bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: platform-bundle

      - name: Run tests with bundled platform
        run: ci/test_bundled_examples.sh "${{ needs.build-and-bundle.outputs.bundle_filename }}"

  create-release:
    name: Create GitHub Release
    needs: [build-and-bundle, test-bundle]
    runs-on: ubuntu-24.04
    # Only run on manual trigger
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: platform-bundle

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BUNDLE_FILE=$(ls *.tar.zst | head -1)

          if [ -z "$BUNDLE_FILE" ]; then
            echo "Error: No bundle file found"
            exit 1
          fi

          ROC_COMMIT=$(python3 ci/get_roc_commit.py | cut -c1-8)

          # Create release with auto-generated notes
          gh release create "${{ github.event.inputs.release_tag }}" \
            "$BUNDLE_FILE" \
            --title "${{ github.event.inputs.release_tag }}" \
            --generate-notes \
            --notes "Platform bundle built with Zig 0.16.0 and Roc $ROC_COMMIT"

          echo "Release created: ${{ github.event.inputs.release_tag }}"
          echo "Bundle uploaded: $BUNDLE_FILE"
